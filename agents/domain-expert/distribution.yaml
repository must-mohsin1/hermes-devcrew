# hermes-devcrew :: domain-expert
# A Hermes profile distribution. Install with:
#   hermes profile install ./agents/domain-expert --yes
name: devcrew-domain-expert
version: 0.2.0
description: "Customizable domain specialist — adapt this agent to YOUR codebase and domain."
hermes_requires: ">=0.12.0"
author: "hermes-devcrew"
license: "MIT"
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key — powers this agent's model"
    required: true
distribution_owned:
  - SOUL.md
  - config.yaml
  - skills
