# hermes-devcrew :: frontend-dev
# Partial config — Hermes deep-merges this over its defaults.
# Override the model locally any time:  hermes --profile devcrew-frontend-dev model
model:
  default: deepseek/deepseek-v4-flash
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions
fallback_providers:
  - { provider: openrouter, model: deepseek/deepseek-v4-pro, base_url: https://openrouter.ai/api/v1, api_mode: chat_completions }
  - { provider: openrouter, model: deepseek/deepseek-v4-flash, base_url: https://openrouter.ai/api/v1, api_mode: chat_completions }

agent:
  reasoning_effort: medium
  # 60 turns: frontend tasks complete in ~317s avg / 1120s max with zero historical budget exhaustions.
  # Wall-clock caps for dispatched workers are per-task max_runtime_seconds (item 10 scope) — agent.gateway_timeout only governs gateway chat-session inactivity, NOT kanban workers, so it is deliberately not set here.
  max_turns: 60
