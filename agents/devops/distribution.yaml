# hermes-devcrew :: devops
# A Hermes profile distribution. Install with:
#   hermes profile install ./agents/devops --yes
name: devcrew-devops
version: 0.1.0
description: "DevOps specialist — containers, CI/CD, deploys, and observability."
hermes_requires: ">=0.12.0"
author: "hermes-devcrew"
license: "MIT"
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key — powers this agent's model"
    required: true
distribution_owned:
  - SOUL.md
  - config.yaml
  - skills
