# hermes-devcrew :: devops
# Partial config — Hermes deep-merges this over its defaults.
# Override the model locally any time:  hermes --profile devcrew-devops model
model:
  default: deepseek/deepseek-v4-flash
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions
toolsets:
  - hermes-cli
agent:
  reasoning_effort: medium
  max_turns: 90
