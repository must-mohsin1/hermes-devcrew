# hermes-devcrew :: architect
# A Hermes profile distribution. Install with:
#   hermes profile install ./agents/architect --yes
name: devcrew-architect
version: 0.1.0
description: "Lead architect — decomposes goals into a verifiable task graph and designs the system."
hermes_requires: ">=0.12.0"
author: "hermes-devcrew"
license: "MIT"
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key — powers this agent's model"
    required: true
distribution_owned:
  - SOUL.md
  - config.yaml
  - skills
