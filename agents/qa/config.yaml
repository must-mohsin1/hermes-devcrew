# hermes-devcrew :: qa
# Partial config — Hermes deep-merges this over its defaults.
# Override the model locally any time:  hermes --profile devcrew-qa model
model:
  default: deepseek/deepseek-v4-pro
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions
fallback_providers:
  - { provider: openrouter, model: deepseek/deepseek-v4-flash, base_url: https://openrouter.ai/api/v1, api_mode: chat_completions }
toolsets:
  - hermes-cli
agent:
  reasoning_effort: high
  # 80 turns: dynamic QA runs reach ~90 iterations at the old cap; full-suite verification + evidence capture needs headroom.
  # Wall-clock caps for dispatched workers are per-task max_runtime_seconds (item 10 scope) — agent.gateway_timeout only governs gateway chat-session inactivity, NOT kanban workers, so it is deliberately not set here.
  max_turns: 80
