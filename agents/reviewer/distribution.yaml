# hermes-devcrew :: reviewer
# A Hermes profile distribution. Install with:
#   hermes profile install ./agents/reviewer --yes
name: devcrew-reviewer
version: 0.1.0
description: "Code reviewer and verifier — correctness, security, and the gate before synthesis."
hermes_requires: ">=0.12.0"
author: "hermes-devcrew"
license: "MIT"
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key — powers this agent's model"
    required: true
distribution_owned:
  - SOUL.md
  - config.yaml
  - skills
