# hermes-devcrew :: designer
# Partial config — Hermes deep-merges this over its defaults.
# Override the model locally any time:  hermes --profile devcrew-designer model
model:
  default: deepseek/deepseek-v3.2
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions
toolsets:
  - hermes-cli
agent:
  reasoning_effort: medium
  max_turns: 90
