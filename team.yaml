# hermes-devcrew — team manifest
# Human-readable reference. The installer derives what it needs from agents/*/distribution.yaml,
# so this file is the single place to *see* the whole team at a glance.
name: hermes-devcrew
version: 0.3.0
description: An autonomous, hybrid software-engineering team for the Hermes agent platform.
license: MIT

# One OpenRouter key powers the whole crew.
env_requires:
  - name: OPENROUTER_API_KEY
    required: true

# Roster — each agent is a Hermes profile distribution under agents/<dir>/.
agents:
  - { name: devcrew-architect,     dir: agents/architect,     swarm_role: anchor,      tier: strong, model: deepseek/deepseek-v4-flash }
  - { name: devcrew-backend-dev,   dir: agents/backend-dev,   swarm_role: worker,      tier: coder,  model: deepseek/deepseek-v4-flash }
  - { name: devcrew-frontend-dev,  dir: agents/frontend-dev,  swarm_role: worker,      tier: coder,  model: deepseek/deepseek-v4-flash }
  - { name: devcrew-devops,        dir: agents/devops,        swarm_role: worker,      tier: coder,  model: deepseek/deepseek-v4-flash }
  - { name: devcrew-reviewer,      dir: agents/reviewer,      swarm_role: verifier,    tier: strong, model: deepseek/deepseek-v4-pro }
  - { name: devcrew-integrator,    dir: agents/integrator,    swarm_role: synthesizer, tier: strong, model: deepseek/deepseek-v4-pro }
  - { name: devcrew-domain-expert, dir: agents/domain-expert, swarm_role: worker,      tier: coder,  model: deepseek/deepseek-v4-flash }
  - { name: devcrew-qa,            dir: agents/qa,            swarm_role: dynamic-verifier, tier: strong, model: deepseek/deepseek-v4-pro }
  - { name: devcrew-designer,      dir: agents/designer,      swarm_role: designer,        tier: strong, model: deepseek/deepseek-v4-flash }

# Default topology: designer (upstream) → parallel workers → reviewer (static gate)
# + qa (dynamic gate, runs the app) → integrator (synthesizer).
swarm:
  anchor:           devcrew-architect
  designer:         devcrew-designer   # upstream of frontend-dev: UI/UX specs
  workers:          [devcrew-backend-dev, devcrew-frontend-dev, devcrew-devops, devcrew-domain-expert]
  verifier:         devcrew-reviewer   # static: reads the code
  dynamic_verifier: devcrew-qa         # runtime: runs the app, after implementation
  synthesizer:      devcrew-integrator

board: devcrew
